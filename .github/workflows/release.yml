name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing git tag to release
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release_target.outputs.version }}

    steps:
      - name: Resolve release target
        id: release_target
        shell: bash
        run: |
          version="${GITHUB_REF#refs/tags/}"
          ref="${GITHUB_REF}"

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${{ inputs.tag }}"
            version="${version#refs/tags/}"
            ref="refs/tags/${version}"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ steps.release_target.outputs.ref }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build with Maven
        run: |
          ./mvnw -B -ntp versions:set -DnewVersion="${{ steps.release_target.outputs.version }}"
          ./mvnw -B -V -ntp clean package -Pprod -DskipTests

      - name: Generate release notes body
        run: |
          mkdir -p build
          ./scripts/write_release_notes.sh "${{ steps.release_target.outputs.version }}" > build/release-notes.md

      - name: Create draft release
        uses: softprops/action-gh-release@v2.6.1
        with:
          draft: true
          tag_name: ${{ steps.release_target.outputs.version }}
          name: Release ${{ steps.release_target.outputs.version }}
          body_path: ./build/release-notes.md
          fail_on_unmatched_files: true
          files: |
            kafka-ui-api/target/kafka-ui-api-${{ steps.release_target.outputs.version }}.jar

      - name: Set up QEMU
        if: github.repository == 'provectus/kafka-ui'
        uses: docker/setup-qemu-action@v3.6.0

      - name: Set up Docker Buildx
        if: github.repository == 'provectus/kafka-ui' || github.repository == 'chenrui333/kafka-ui'
        uses: docker/setup-buildx-action@v3.11.1

      - name: Cache Docker layers
        if: github.repository == 'provectus/kafka-ui' || github.repository == 'chenrui333/kafka-ui'
        uses: actions/cache@v4.2.4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Login to DockerHub
        if: github.repository == 'provectus/kafka-ui'
        uses: docker/login-action@v3.6.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push DockerHub image
        if: github.repository == 'provectus/kafka-ui'
        uses: docker/build-push-action@v7.0.0
        with:
          context: kafka-ui-api
          platforms: linux/amd64,linux/arm64
          provenance: false
          push: true
          tags: |
            provectuslabs/kafka-ui:${{ steps.release_target.outputs.version }}
            provectuslabs/kafka-ui:latest
          build-args: |
            JAR_FILE=kafka-ui-api-${{ steps.release_target.outputs.version }}.jar
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache

      - name: Login to GHCR
        if: github.repository == 'chenrui333/kafka-ui'
        uses: docker/login-action@v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push GHCR image
        if: github.repository == 'chenrui333/kafka-ui'
        uses: docker/build-push-action@v7.0.0
        with:
          context: kafka-ui-api
          platforms: linux/amd64
          provenance: false
          push: true
          tags: |
            ghcr.io/chenrui333/kafka-ui:${{ steps.release_target.outputs.version }}
            ghcr.io/chenrui333/kafka-ui:latest
          build-args: |
            JAR_FILE=kafka-ui-api-${{ steps.release_target.outputs.version }}.jar
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache

      - name: Publish release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ steps.release_target.outputs.version }}
          name: Release ${{ steps.release_target.outputs.version }}
          body_path: ./build/release-notes.md
          make_latest: "true"

  charts:
    runs-on: ubuntu-latest
    if: github.repository == 'provectus/kafka-ui'
    needs: release
    steps:
      - name: Repository Dispatch
        uses: peter-evans/repository-dispatch@v4.0.0
        with:
          token: ${{ secrets.CHARTS_ACTIONS_TOKEN }}
          repository: provectus/kafka-ui-charts
          event-type: prepare-helm-release
          client-payload: '{"appversion": "${{ needs.release.outputs.version }}"}'
