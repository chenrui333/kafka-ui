name: "Infra: Triage: Apply triage label for issues"
on:
  issues:
    types:
      - opened
jobs:
  triage_issues:
    runs-on: ubuntu-latest
    steps:
      - name: Label issue
        uses: andymckay/labeler@3a4296e9dcdf9576b0456050db78cfd34853f260
        with:
          add-labels: "status/triage"
          ignore-if-assigned: true
