name: "Docs: Build & deploy"
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited
    paths:
      - 'docs/**'
      - 'documentation/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/documentation.yaml'
      - 'README.md'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - 'mise.toml'
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'documentation/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/documentation.yaml'
      - 'README.md'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - 'mise.toml'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  link-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check URLs in files
        uses: urlstechie/urlchecker-action@b643b43e2ac605e1475331c7b67247d242b7dce4 # 0.0.34
        with:
          exclude_patterns: localhost,127.0.,192.168.,chenrui333.github.io/kafka-ui,kafka-connect0,schema-registry0
          exclude_urls: https://api.server,https://graph.microsoft.com/User.Read,https://dev-a63ggcut.auth0.com/,http://main-schema-registry:8081,http://schema-registry:8081,http://another-yet-schema-registry:8081,http://another-schema-registry:8081
          print_all: false
          file_types: .md
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # node24 support after v5.0.0
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: requirements-docs.txt
      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-docs.txt
      - name: Build docs
        run: mkdocs build --strict
      - name: Archive Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          tar \
            --dereference --hard-dereference \
            --directory site \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            --exclude=".[^/]*" \
            .
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - link-check
      - build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy docs site
        id: deployment
        uses: actions/deploy-pages@bbe2a950ee52d4f5cbe74e6d9d6a8803676e91d5 # node24 support after v4.0.5
