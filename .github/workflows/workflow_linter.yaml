name: "Infra: Workflow linter"
on:
  pull_request:
    types:
      - "opened"
      - "reopened"
      - "synchronize"
      - "edited"
    paths:
      - ".github/workflows/**"
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.25.1"
      - name: Cache Go build files
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('.github/workflows/workflow_linter.yaml') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Install pinact
        run: go install github.com/suzuki-shunsuke/pinact/v3/cmd/pinact@v3.9.0
      - name: Validate workflow action pins
        run: pinact run --check
      - name: Install yamllint
        run: sudo apt install -y yamllint
      - name: Validate workflow yaml files
        run: yamllint .github/workflows/. -d relaxed -f github --no-warnings
